<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Блог{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .post-card {
            transition: 0.2s;
        }

        .post-card:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <!-- Навигация -->
<!-- Навигация -->
<nav class="navbar navbar-light bg-white border-bottom">
<div class="container">

    <a class="navbar-brand fw-bold" href="/">
        MyBlog
    </a>

    <!-- 👇 Приветствие пользователя -->
    <div class="d-flex align-items-center gap-3">

        {% if request.user.is_authenticated %}
            <div class="text-muted small">
                Привет, <span class="fw-semibold text-dark">
                    {{ request.user.email }}
                </span>
            </div>
        {% endif %}

    </div>

    <div class="d-flex gap-2 align-items-center">

        <a href="{% url 'posts' %}" class="btn btn-sm btn-outline-primary">
            Посты
        </a>

        {% if not request.user.is_authenticated %}
            <a href="{% url 'register' %}" class="btn btn-sm btn-outline-primary">
                Зарегаться
            </a>

            <a href="{% url 'login' %}" class="btn btn-sm btn-outline-primary">
                Войти
            </a>
            
        {% else %}
            <a href="{% url 'logout' %}" class="btn btn-sm btn-outline-danger">
                Выйти
            </a>
            <a href="{% url 'post_create' %}" class="btn btn-sm btn-primary">
            + Создать пост
            </a>
        {% endif %}

    </div>

</div>
</nav>

    <!-- Контент -->
    <main class="container py-5">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="border-top bg-white py-3 mt-5">
        <div class="container text-center text-muted">
            © 2026 MyBlog
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
