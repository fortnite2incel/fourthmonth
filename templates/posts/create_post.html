{% extends 'base.html' %}

{% block title %}
    {% if form.instance.pk %}Редактировать пост{% else %}Создать пост{% endif %}
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-dark text-white">
                <h3 class="mb-0">
                    {% if form.instance.pk %}Редактирование поста{% else %}Создание поста{% endif %}
                </h3>
            </div>

            <div class="card-body p-4">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-dark">
                            {% if form.instance.pk %}Сохранить изменения{% else %}Опубликовать{% endif %}
                        </button>
                        <a href="{% url 'posts' %}" class="btn btn-outline-secondary">
                            Отмена
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
